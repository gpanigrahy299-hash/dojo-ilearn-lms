<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOJO i-Learn · HARMAN Trainer LMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#030712;
  --midnight:#070d1c;
  --royal:#0a1230;
  --glass:rgba(255,255,255,0.045);
  --glass-brd:rgba(255,255,255,0.09);
  --cyan:#00dcff;
  --purple:#a855f7;
  --pink:#ff3fb0;
  --silver:#c9d3e0;
  --slate:#8a94a8;
  --white:#f5f8ff;
  --ok:#22e5a0;
  --warn:#ffb020;
  --err:#ff4d6d;
  --l1:#3aa0ff; --l2:#22e5a0; --l3:#ffb020; --l4:#a855f7;
  --r8:8px; --r14:14px; --r20:20px;
  --ease:cubic-bezier(.16,.8,.24,1);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--navy);
  color:var(--white);
  overflow-x:hidden;
  -webkit-user-select:none; user-select:none;
}
::selection{background:transparent;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--cyan),var(--purple)); border-radius:8px;}

/* ---------- VIDEO BACKGROUND ---------- */
#bgVideoWrap{position:fixed; inset:0; z-index:0; overflow:hidden;}
#bgVideo{width:100%; height:100%; object-fit:cover; filter:brightness(.62) saturate(1.15) contrast(1.03);}
#bgScrim{position:fixed; inset:0; z-index:1;
  background:
    radial-gradient(1100px 700px at 15% 8%, rgba(0,220,255,.06), transparent 60%),
    radial-gradient(900px 650px at 90% 85%, rgba(168,85,247,.07), transparent 60%),
    linear-gradient(180deg, rgba(3,7,18,.30), rgba(3,7,18,.52) 55%, rgba(3,7,18,.68));
}
#gridOverlay{position:fixed; inset:0; z-index:1; opacity:.35; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,220,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,220,255,.04) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(1200px 700px at 50% 20%, black, transparent 75%);
}

/* ---------- WATERMARK ---------- */
#wmH1{position:fixed; z-index:9997; pointer-events:none; mix-blend-mode:overlay;}
#wmH2{position:fixed; z-index:9997; pointer-events:none; mix-blend-mode:overlay;}

/* ---------- APP SHELL ---------- */
#app{position:relative; z-index:5; min-height:100vh; display:none;}
#app.show{display:block;}

/* Glass utility */
.glass{
  background:var(--glass);
  border:1px solid var(--glass-brd);
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  border-radius:var(--r20);
  box-shadow:0 8px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
}

/* ---------- LOGIN ---------- */
#loginScreen{position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;}
.loginCard{width:400px; max-width:92vw; padding:38px 34px 30px; text-align:center; animation:riseIn .7s var(--ease);}
@keyframes riseIn{from{opacity:0; transform:translateY(24px) scale(.97);} to{opacity:1; transform:none;}}
.brandMark{width:64px; height:64px; margin:0 auto 14px; position:relative;}
.brandMark svg{width:100%; height:100%;}
.loginCard h1{font-size:21px; font-weight:800; letter-spacing:.3px;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  -webkit-background-clip:text; background-clip:text; color:transparent;}
.loginCard p.sub{color:var(--slate); font-size:12.5px; margin-top:4px; letter-spacing:.5px; text-transform:uppercase;}
.field{margin-top:20px; text-align:left; position:relative;}
.field label{font-size:11.5px; color:var(--slate); font-weight:600; letter-spacing:.4px; text-transform:uppercase; display:block; margin-bottom:6px;}
.field input, .field select{
  width:100%; padding:12px 14px; border-radius:var(--r14); font-size:14px;
  background:rgba(255,255,255,.04); border:1px solid var(--glass-brd); color:var(--white);
  outline:none; transition:.25s var(--ease); -webkit-user-select:text; user-select:text;
}
.field select option{background:#0a1230; color:var(--white);}
.field input:focus, .field select:focus{border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,220,255,.14);}
.btnPrimary{
  margin-top:24px; width:100%; padding:13px; border:none; border-radius:var(--r14); cursor:pointer;
  font-weight:700; font-size:14px; letter-spacing:.3px; color:#031018;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  box-shadow:0 6px 26px rgba(0,220,255,.28);
  transition:transform .2s var(--ease), box-shadow .2s var(--ease);
}
.btnPrimary:hover{transform:translateY(-2px); box-shadow:0 10px 34px rgba(168,85,247,.35);}
.btnPrimary:active{transform:translateY(0);}
.loginErr{color:var(--err); font-size:12px; margin-top:10px; min-height:14px;}
.roleHint{margin-top:16px; font-size:11px; color:var(--slate); line-height:1.6;}

/* ---------- SHELL LAYOUT ---------- */
#shell{display:grid; grid-template-columns:252px 1fr; min-height:100vh;}
#sidebar{padding:20px 14px; display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh; overflow-y:auto; border-right:1px solid var(--glass-brd);}
.sbLogo{display:flex; align-items:center; gap:10px; padding:6px 10px 18px;}
.sbLogo .mark{width:34px; height:34px;}
.sbLogo b{font-size:15px; font-weight:800; letter-spacing:.3px;}
.sbLogo span{display:block; font-size:9.5px; color:var(--slate); letter-spacing:1.2px; text-transform:uppercase;}
.navGroupLabel{font-size:10px; color:var(--slate); text-transform:uppercase; letter-spacing:1.2px; margin:14px 10px 6px;}
.navItem{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; cursor:pointer; font-size:13.5px; font-weight:600; color:var(--silver); transition:.2s var(--ease); position:relative;}
.navItem svg{width:17px; height:17px; flex:none; opacity:.8;}
.navItem:hover{background:rgba(255,255,255,.05); color:var(--white);}
.navItem.active{background:linear-gradient(90deg, rgba(0,220,255,.14), rgba(168,85,247,.10)); color:var(--white); box-shadow:inset 0 0 0 1px rgba(0,220,255,.25);}
.navItem.active svg{opacity:1;}
.sbUser{margin-top:auto; padding:12px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid var(--glass-brd); display:flex; align-items:center; gap:10px;}
.avatar{width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--cyan),var(--purple)); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:#031018;}
.sbUser div b{font-size:12.5px; display:block;}
.sbUser div span{font-size:10.5px; color:var(--slate);}
.logoutBtn{margin-left:auto; cursor:pointer; opacity:.6; transition:.2s;}
.logoutBtn:hover{opacity:1; color:var(--err);}

#main{padding:20px 26px 60px; min-width:0;}
#topbar{display:flex; align-items:center; gap:16px; margin-bottom:20px; padding:12px 18px;}
#topbar .searchBox{flex:1; display:flex; align-items:center; gap:8px; padding:9px 14px; border-radius:12px; background:rgba(255,255,255,.03); border:1px solid var(--glass-brd);}
#topbar .searchBox input{background:none; border:none; outline:none; color:var(--white); font-size:13px; width:100%; -webkit-user-select:text; user-select:text;}
#topbar .searchBox svg{width:15px; height:15px; color:var(--slate); flex:none;}
.tbStat{display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:12px; background:rgba(255,255,255,.03); border:1px solid var(--glass-brd); font-size:12px;}
.tbStat b{color:var(--cyan); font-size:14px;}
#clockPill{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--slate); padding:8px 12px;}

.pageHead{margin-bottom:18px;}
.pageHead h2{font-size:22px; font-weight:800; letter-spacing:.2px;}
.pageHead p{font-size:12.5px; color:var(--slate); margin-top:3px;}
.crumbs{font-size:11px; color:var(--slate); margin-bottom:6px; display:flex; gap:6px; align-items:center;}
.crumbs b{color:var(--cyan); cursor:pointer;}

/* card grid */
.grid{display:grid; gap:16px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(2,1fr);}}

.navCard{padding:20px; cursor:pointer; transition:.28s var(--ease); position:relative; overflow:hidden;}
.navCard:hover{transform:translateY(-4px); box-shadow:0 16px 46px rgba(0,220,255,.16), inset 0 1px 0 rgba(255,255,255,.06);}
.navCard .icoWrap{width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, rgba(0,220,255,.18), rgba(168,85,247,.14)); margin-bottom:14px; border:1px solid rgba(0,220,255,.25);}
.navCard .icoWrap svg{width:22px; height:22px; color:var(--cyan);}
.navCard h3{font-size:14.5px; font-weight:700; margin-bottom:5px;}
.navCard p{font-size:12px; color:var(--slate); line-height:1.5;}
.navCard .badge{position:absolute; top:16px; right:16px; font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; background:rgba(0,220,255,.14); color:var(--cyan); border:1px solid rgba(0,220,255,.3);}

/* KPI cards */
.kpi{padding:18px 20px; position:relative; overflow:hidden; transition:.25s var(--ease);}
.kpi:hover{transform:translateY(-3px); box-shadow:0 14px 40px rgba(0,220,255,.14);}
.kpi .top{display:flex; justify-content:space-between; align-items:flex-start;}
.kpi .lbl{font-size:11px; color:var(--slate); text-transform:uppercase; letter-spacing:.8px; font-weight:700;}
.kpi .val{font-size:28px; font-weight:800; margin-top:8px; font-family:'JetBrains Mono',monospace;}
.kpi .delta{font-size:11px; margin-top:6px; font-weight:600;}
.kpi .delta.up{color:var(--ok);} .kpi .delta.down{color:var(--err);}
.kpi .icoWrap{width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center;}
.kpi .icoWrap svg{width:18px; height:18px;}
.kpi::after{content:''; position:absolute; left:0; right:0; bottom:0; height:2px; background:linear-gradient(90deg,var(--cyan),var(--purple)); opacity:.6;}

/* generic card */
.card{padding:20px;}
.cardHead{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
.cardHead h3{font-size:14.5px; font-weight:700;}
.cardHead .actions{display:flex; gap:8px;}

/* buttons */
.btn{padding:8px 14px; border-radius:10px; font-size:12.5px; font-weight:600; cursor:pointer; border:1px solid var(--glass-brd); background:rgba(255,255,255,.04); color:var(--silver); transition:.2s var(--ease); display:inline-flex; align-items:center; gap:6px;}
.btn:hover{background:rgba(255,255,255,.08); color:var(--white); transform:translateY(-1px);}
.btn.primary{background:linear-gradient(90deg,var(--cyan),var(--purple)); color:#031018; border:none; font-weight:700;}
.btn.primary:hover{box-shadow:0 8px 24px rgba(0,220,255,.3);}
.btn.sm{padding:5px 10px; font-size:11px;}
.btn svg{width:13px; height:13px;}
.btn:disabled{opacity:.35; cursor:not-allowed; transform:none;}

.chip{display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:10.5px; font-weight:700; letter-spacing:.3px;}
.chip.l1{background:rgba(58,160,255,.15); color:var(--l1); border:1px solid rgba(58,160,255,.35);}
.chip.l2{background:rgba(34,229,160,.15); color:var(--l2); border:1px solid rgba(34,229,160,.35);}
.chip.l3{background:rgba(255,176,32,.15); color:var(--l3); border:1px solid rgba(255,176,32,.35);}
.chip.l4{background:rgba(168,85,247,.15); color:var(--l4); border:1px solid rgba(168,85,247,.35);}
.chip.grey{background:rgba(138,148,168,.15); color:var(--slate); border:1px solid rgba(138,148,168,.3);}
.chip.ok{background:rgba(34,229,160,.15); color:var(--ok); border:1px solid rgba(34,229,160,.35);}
.chip.err{background:rgba(255,77,109,.15); color:var(--err); border:1px solid rgba(255,77,109,.35);}
.chip.warn{background:rgba(255,176,32,.15); color:var(--warn); border:1px solid rgba(255,176,32,.35);}

/* filters row */
.filterRow{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:16px;}
.filterField{display:flex; flex-direction:column; gap:5px; min-width:150px;}
.filterField label{font-size:10px; color:var(--slate); text-transform:uppercase; letter-spacing:.6px; font-weight:700;}
.filterField select, .filterField input{padding:9px 12px; border-radius:10px; background:rgba(255,255,255,.04); border:1px solid var(--glass-brd); color:var(--white); font-size:12.5px; outline:none;}
.filterField select:focus, .filterField input:focus{border-color:var(--cyan);}
.filterField select option{background:#0a1230;}
.searchMini{display:flex; align-items:center; gap:6px; padding:9px 12px; border-radius:10px; background:rgba(255,255,255,.04); border:1px solid var(--glass-brd); min-width:220px;}
.searchMini input{background:none; border:none; outline:none; color:var(--white); font-size:12.5px; width:100%;}
.searchMini svg{width:14px; height:14px; color:var(--slate); flex:none;}

/* table */
.tableWrap{overflow:auto; border-radius:16px; border:1px solid var(--glass-brd);}
table{width:100%; border-collapse:collapse; font-size:12.5px; min-width:700px;}
thead th{position:sticky; top:0; z-index:2; background:rgba(10,18,48,.92); backdrop-filter:blur(10px); text-align:left; padding:11px 14px; font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--slate); font-weight:700; border-bottom:1px solid var(--glass-brd); white-space:nowrap;}
tbody td{padding:11px 14px; border-bottom:1px solid rgba(255,255,255,.04); white-space:nowrap;}
tbody tr{transition:.15s;}
tbody tr:nth-child(even){background:rgba(255,255,255,.015);}
tbody tr:hover{background:rgba(0,220,255,.06);}
tbody tr.rowFail{background:rgba(255,77,109,.08) !important;}
tbody tr.rowWarn{background:rgba(255,176,32,.07) !important;}
tbody tr.rowDisabled{opacity:.4;}
.nameCell{cursor:pointer; font-weight:700; color:var(--cyan);}
.nameCell:hover{text-decoration:underline;}
.progWrap{width:90px; height:6px; border-radius:4px; background:rgba(255,255,255,.08); overflow:hidden; position:relative;}
.progFill{height:100%; border-radius:4px; background:linear-gradient(90deg,var(--cyan),var(--purple)); transition:width 1s var(--ease);}
.skillBox{display:flex; gap:2px;}
.seg{width:9px; height:16px; border-radius:2px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1);}
.seg.on{background:linear-gradient(180deg,var(--cyan),var(--purple)); border-color:transparent; box-shadow:0 0 8px rgba(0,220,255,.5);}
.seg.mid{background:linear-gradient(180deg,var(--warn),#a86400); border-color:transparent; box-shadow:0 0 6px rgba(255,176,32,.5);}

.pager{display:flex; align-items:center; justify-content:space-between; margin-top:14px; font-size:12px; color:var(--slate); flex-wrap:wrap; gap:10px;}
.pager .pbtns{display:flex; gap:6px;}
.pgBtn{width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.04); border:1px solid var(--glass-brd); cursor:pointer; font-size:11.5px; font-weight:700; color:var(--silver);}
.pgBtn.active{background:linear-gradient(90deg,var(--cyan),var(--purple)); color:#031018; border:none;}
.pgBtn:hover:not(.active){background:rgba(255,255,255,.09);}

/* modal */
.modalOverlay{position:fixed; inset:0; background:rgba(2,5,12,.7); backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:.3s var(--ease);}
.modalOverlay.show{opacity:1; pointer-events:all;}
.modalBox{width:560px; max-width:92vw; max-height:86vh; overflow:auto; padding:26px; transform:scale(.92) translateY(10px); transition:.32s var(--ease);}
.modalOverlay.show .modalBox{transform:scale(1) translateY(0);}
.modalClose{position:absolute; top:16px; right:16px; width:30px; height:30px; border-radius:9px; background:rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center; cursor:pointer; border:1px solid var(--glass-brd);}
.modalClose:hover{background:rgba(255,77,109,.18); border-color:rgba(255,77,109,.4);}

.pillGrid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
.pillItem{padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.03); border:1px solid var(--glass-brd); font-size:12px;}
.pillItem b{display:block; font-size:12.5px; margin-top:2px;}

.empty{padding:50px 20px; text-align:center; color:var(--slate); font-size:13px;}
.empty svg{width:40px; height:40px; margin-bottom:10px; opacity:.4;}

.toast{position:fixed; bottom:24px; right:24px; z-index:200; padding:13px 20px; border-radius:14px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:10px; transform:translateY(20px); opacity:0; transition:.3s var(--ease);}
.toast.show{transform:none; opacity:1;}

.bulkBar{position:sticky; bottom:0; margin-top:12px; padding:12px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; animation:riseIn .3s var(--ease);}

/* fade-in for route changes */
.routeFade{animation:fadeUp .38s var(--ease);}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

/* skeleton */
.skel{background:linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.09) 37%, rgba(255,255,255,.04) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:8px;}
@keyframes shimmer{0%{background-position:100% 0;} 100%{background-position:-100% 0;}}

/* devtools overlay */
#dtOverlay{position:fixed; inset:0; z-index:99999; background:#000; color:#00dcff; display:none; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:1px; text-align:center;}

/* responsive */
@media(max-width:980px){
  #shell{grid-template-columns:1fr;}
  #sidebar{position:fixed; left:-260px; top:0; z-index:60; width:250px; background:rgba(3,7,18,.96); transition:.3s var(--ease);}
  #sidebar.open{left:0;}
  #main{padding:16px;}
  .g4,.g3,.g2{grid-template-columns:1fr 1fr;}
}
#mobMenuBtn{display:none;}
@media(max-width:980px){#mobMenuBtn{display:flex;}}
</style>
